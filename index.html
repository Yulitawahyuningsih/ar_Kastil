<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>project-kastil</title>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.0.0/dist/aframe-extras.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/aframe/build/aframe-ar.js"></script>
  <style>
    .marquee-container {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background: rgba(0, 0, 0, 0.75);
      z-index: 9999;
      overflow: hidden;
      padding: 12px 0;
      display: none;
    }
    .marquee-text {
      display: inline-block;
      white-space: nowrap;
      color: #FFD700;
      font-family: Arial, sans-serif;
      font-size: 14px;
      font-weight: bold;
      animation: marquee 25s linear infinite;
    }
    @keyframes marquee {
      0%   { transform: translateX(100vw); }
      100% { transform: translateX(-100%); }
    }
    #status {
      position: fixed;
      top: 10px;
      left: 10px;
      background: rgba(0,0,0,0.7);
      color: #0f0;
      font-family: monospace;
      font-size: 13px;
      padding: 6px 10px;
      z-index: 9999;
      border-radius: 6px;
    }
  </style>
</head>
<body style="margin: 0; overflow: hidden;">

  <div id="status">Memuat model...</div>

  <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: false">
    <a-assets>
      <audio id="musik-bg" src="kastil.mp3" preload="auto"></audio>
    </a-assets>

    <a-marker preset="hiro" id="marker-utama" smooth="true" smoothCount="25" smoothTolerance="0.005" smoothThreshold="8">
      <a-entity
        id="model-kastil"
        gltf-model="projek-ar-kastil-fantasi3.glb"
        animation-mixer="clip: *; loop: repeat; timeScale: 1"
        scale="0.015 0.015 0.015"
        position="0 -1.5 0"
        rotation="-90 0 -45">
      </a-entity>
    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>

  <div id="marquee" class="marquee-container">
    <span class="marquee-text">✨ Selamat datang di Kastil Fantasi ✨</span>
  </div>

  <script>
    const marker = document.querySelector('#marker-utama');
    const musik = document.querySelector('#musik-bg');
    const marquee = document.getElementById('marquee');
    const model = document.querySelector('#model-kastil');
    const status = document.getElementById('status');

    model.addEventListener('model-loaded', () => {
      status.textContent = 'Model berhasil dimuat';
      status.style.color = '#0f0';
    });

    model.addEventListener('model-error', (e) => {
      status.textContent = 'Gagal memuat model';
      status.style.color = 'red';
      console.error('Model error:', e.detail);
    });

    marker.addEventListener('markerFound', () => {
      musik.play().catch(() => {});
      marquee.style.display = 'block';
    });

    marker.addEventListener('markerLost', () => {
      musik.pause();
      marquee.style.display = 'none';
    });
  </script>

</body>
</html>
